<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brinewerk — Creature POC</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060e12;
    color: #7eeee4;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    min-height: 100vh;
  }
  #controls {
    position: sticky; top: 0; z-index: 10;
    background: #0a1a20;
    border-bottom: 2px solid #1a3a3f;
    padding: 16px 24px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  #controls h1 { font-size: 14px; color: #3aada8; margin-right: auto; }
  button {
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    background: #1a3a3f; color: #7eeee4;
    border: 2px solid #3aada8; padding: 10px 16px;
    cursor: pointer; transition: background 0.15s;
  }
  button:hover { background: #3aada8; color: #060e12; }
  #count { font-size: 9px; color: #3aada8; }
  #creature-grid {
    display: flex; flex-wrap: wrap; gap: 16px;
    padding: 24px; justify-content: center;
  }
  .creature-card {
    background: #0a1a20; border: 1px solid #1a3a3f;
    border-radius: 4px; padding: 12px; width: 200px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .creature-card:hover { border-color: #3aada8; }
  .creature-card.rare { box-shadow: 0 0 12px var(--rare-color, #fff3); }
  .creature-card canvas {
    image-rendering: pixelated; border-radius: 2px; background: #060e12;
  }
  .creature-type {
    font-size: 8px; padding: 3px 8px; border-radius: 2px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .type-stellarid { background: #1a5c5e; color: #7eeee4; }
  .type-blobid   { background: #5a2a5a; color: #ffaabf; }
  .type-corallid  { background: #2a5a2a; color: #8aee8a; }
  .type-nucleid   { background: #1a2a6b; color: #7aaaff; }
  .rare-badge {
    font-size: 7px; padding: 2px 6px; border-radius: 2px;
    letter-spacing: 1px;
  }
  .creature-name { font-size: 10px; color: #dadaff; text-align: center; }
  .trait-bars { width: 100%; display: flex; flex-direction: column; gap: 3px; }
  .trait-row { display: flex; align-items: center; gap: 6px; }
  .trait-label { font-size: 7px; color: #3aada8; width: 42px; text-align: right; flex-shrink: 0; }
  .trait-bar-bg { flex: 1; height: 6px; background: #0d2228; border-radius: 1px; overflow: hidden; }
  .trait-bar-fill { height: 100%; border-radius: 1px; }
</style>
</head>
<body>
<div id="controls">
  <h1>BRINEWERK</h1>
  <button onclick="generateRandom()">+ Random</button>
  <button onclick="generateAllTypes()">+ All Types</button>
  <button onclick="generateAllRares()">+ All Rares</button>
  <button onclick="clearAll()">Clear</button>
  <span id="count">0 creatures</span>
</div>
<div id="creature-grid"></div>

<script>
// ============================================================
// PRNG
// ============================================================
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function _sr(x, y, seed) {
  const n = Math.sin(x * 127.1 + y * 311.7 + seed) * 43758.5453;
  return n - Math.floor(n);
}

// ============================================================
// PALETTES
// ============================================================
const PALETTES = [
  { name:'Deep Teal',     outline:'#0a2a2f', body:'#1a5c5e', hi:'#3aada8', accent:'#7eeee4' },
  { name:'Coral Rose',    outline:'#2a0f1a', body:'#8b3a5a', hi:'#d4627a', accent:'#ffaabf' },
  { name:'Brine Gold',    outline:'#1a1a05', body:'#6b6a20', hi:'#b8b44a', accent:'#f0ee8a' },
  { name:'Abyss Blue',    outline:'#050520', body:'#1a2a6b', hi:'#3a5acd', accent:'#7aaaff' },
  { name:'Kelp Green',    outline:'#0a1a0a', body:'#2a6b2a', hi:'#4aad4a', accent:'#8aee8a' },
  { name:'Urchin Purple', outline:'#1a0a2a', body:'#5a2a8b', hi:'#8a4acd', accent:'#caaaff' },
  { name:'Magma Orange',  outline:'#2a0a00', body:'#8b3a0a', hi:'#cd6a2a', accent:'#ffaa5a' },
  { name:'Ghost White',   outline:'#1a1a2a', body:'#5a5a7b', hi:'#9a9abd', accent:'#dadaff' },
];
function getPalette(gene) {
  return PALETTES[Math.floor(gene * PALETTES.length) % PALETTES.length];
}

// ============================================================
// RARE EFFECTS
// ============================================================
const RARE_EFFECTS = [
  { id:'none',     label:'',         icon:'',  chance:0.60, color:'#8ba0a8' },
  { id:'metallic', label:'Metallic', icon:'⚙', chance:0.08, color:'#c0c8d0' },
  { id:'glitch',   label:'Glitch',   icon:'▦', chance:0.05, color:'#00ff88' },
  { id:'fire',     label:'On Fire',  icon:'🔥', chance:0.05, color:'#ff6020' },
  { id:'frost',    label:'Frost',    icon:'❄', chance:0.05, color:'#80d0ff' },
  { id:'shiny',    label:'Shiny',    icon:'✨', chance:0.05, color:'#ffe040' },
  { id:'starry',   label:'Starry',   icon:'★', chance:0.04, color:'#c0a0ff' },
  { id:'toxic',    label:'Toxic',    icon:'☣', chance:0.04, color:'#80ff40' },
  { id:'phantom',  label:'Phantom',  icon:'👻', chance:0.04, color:'#a080c0' },
];
function rollRare(rng) {
  let r = rng(), cum = 0;
  for (const e of RARE_EFFECTS) { cum += e.chance; if (r < cum) return e.id; }
  return 'none';
}
function getRareInfo(id) { return RARE_EFFECTS.find(e => e.id === id); }

// ============================================================
// NAME GENERATOR
// ============================================================
const SYLLABLES = {
  stellarid: { pre:['Zar','Thor','Krix','Stel','Axi','Rax','Vex','Nok','Spir','Thar'], mid:["'",'-','a','i','o'], suf:['xil','ak','on','us','yx','ar','ix','el','um','is'] },
  blobid:    { pre:['Lum','Oob','Glu','Plu','Bub','Moo','Noo','Wob','Flo','Soo'], mid:['a','u','o','i','ee'], suf:['va','li','ba','na','ri','la','mi','pa','shi','zu'] },
  corallid:  { pre:['Den','Fron','Bra','Cor','Rhi','Arb','Phy','Ram','Lig','Pol'], mid:['a','i','o','e','u'], suf:['drik','dal','lix','ris','zon','nid','tex','ral','fex','kin'] },
  nucleid:   { pre:['Hex','Pol','Cry','Geo','Tes','Pyr','Oct','Fac','Pri','Sym'], mid:['a','i','o','y','e'], suf:['ion','trix','gon','dex','ron','lis','nar','zen','plex','tor'] }
};
function generateName(type, rng) {
  const s = SYLLABLES[type];
  return s.pre[Math.floor(rng()*s.pre.length)] + s.mid[Math.floor(rng()*s.mid.length)] + s.suf[Math.floor(rng()*s.suf.length)];
}

// ============================================================
// CREATURE FACTORY
// ============================================================
const TYPES = ['stellarid','blobid','corallid','nucleid'];

function createCreature(type, seed, forceRare) {
  seed = seed ?? Math.floor(Math.random() * 2147483647);
  type = type ?? TYPES[Math.floor(Math.random() * TYPES.length)];
  const rng = mulberry32(seed);
  const genes = {
    arms: rng(), size: rng(), fatness: rng(), spikes: rng(),
    pattern: rng(), glow: rng(), eyes: rng(), wobble: rng(),
    palette1: rng(), palette2: rng(),
    tentacles: rng(), branches: rng(), density: rng(),
    facets: rng(), rings: rng()
  };
  const rare = forceRare || rollRare(rng);
  const nameRng = mulberry32(seed + 999);
  const name = generateName(type, nameRng);
  return { type, genes, name, seed, rare };
}

// ============================================================
// PIXEL GRID HELPERS
// ============================================================
const GRID_SIZE = 40;
const BLOCK_PX = 3;
const CANVAS_PX = GRID_SIZE * BLOCK_PX;

function _sp(grid, x, y, color) {
  x = Math.round(x); y = Math.round(y);
  if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) grid[`${x},${y}`] = color;
}
function fillCircle(grid, cx, cy, r, fill, outline) {
  for (let dy = -r-1; dy <= r+1; dy++) for (let dx = -r-1; dx <= r+1; dx++) {
    const d = Math.sqrt(dx*dx+dy*dy);
    if (d <= r) _sp(grid, cx+dx, cy+dy, (outline && d > r-1.2) ? outline : fill);
  }
}
function fillEllipse(grid, cx, cy, rx, ry, color) {
  for (let dy = -Math.ceil(ry); dy <= Math.ceil(ry); dy++)
    for (let dx = -Math.ceil(rx); dx <= Math.ceil(rx); dx++)
      if ((dx*dx)/(rx*rx)+(dy*dy)/(ry*ry) <= 1) _sp(grid, cx+dx, cy+dy, color);
}
function addEyes(grid, cx, cy, genes, pal) {
  const ec = Math.round(genes.eyes * 3), pos = [];
  if (ec >= 1) pos.push([cx-2,cy-1]);
  if (ec >= 2) pos.push([cx+2,cy-1]);
  if (ec >= 3) pos.push([cx,cy+1]);
  for (const [ex,ey] of pos) { _sp(grid,ex,ey,'#ffffff'); _sp(grid,ex,ey-1,pal.outline); }
}
function renderGridToCanvas(grid, ctx) {
  ctx.clearRect(0,0,CANVAS_PX,CANVAS_PX);
  for (const key in grid) {
    const [x,y] = key.split(',').map(Number);
    ctx.fillStyle = grid[key];
    ctx.fillRect(x*BLOCK_PX, y*BLOCK_PX, BLOCK_PX, BLOCK_PX);
  }
}

// ============================================================
// CREATURE RENDERERS (same as before, with time param)
// ============================================================
function renderStellarid(genes, time, seed) {
  const grid = {}, pal = getPalette(genes.palette1), pal2 = getPalette(genes.palette2);
  const cx=20,cy=20, armCount=3+Math.floor(genes.arms*6), size=8+Math.floor(genes.size*10);
  const fatness=0.3+genes.fatness*0.7, bodyR=Math.round(size*0.35*fatness+2);
  const spikes=Math.round(genes.spikes*3), pattern=Math.round(genes.pattern*4), wobble=genes.wobble*3;
  for (let i=0;i<armCount;i++) {
    const baseAngle=(i/armCount)*Math.PI*2-Math.PI/2;
    const angle=baseAngle+Math.sin(time*2+i*1.5)*wobble*0.06;
    const armLen=size, armW=Math.max(2,Math.round(size*0.22*fatness));
    for (let t=0;t<=armLen;t++) {
      const taper=1-(t/armLen)*0.7, w=Math.max(1,Math.round(armW*taper));
      const ax=Math.cos(angle)*(bodyR-1+t), ay=Math.sin(angle)*(bodyR-1+t);
      const px=-Math.sin(angle), py=Math.cos(angle);
      for (let s=-w;s<=w;s++) {
        const edge=Math.abs(s)>=w||t===armLen;
        let c=edge?pal.outline:pal.body;
        if (!edge&&pattern>=2&&t%4<2) c=pal.accent;
        _sp(grid,cx+Math.round(ax+px*s),cy+Math.round(ay+py*s),c);
      }
      if (spikes>=1&&t%Math.max(3,7-spikes)===0&&t>2&&t<armLen-1)
        for (let s2=1;s2<=Math.min(spikes+1,4);s2++) {
          const side=t%2===0?1:-1;
          _sp(grid,cx+Math.round(ax+px*(w+s2)*side),cy+Math.round(ay+py*(w+s2)*side),
            s2===Math.min(spikes+1,4)?pal.outline:pal2.accent);
        }
    }
  }
  for (let dy=-bodyR-1;dy<=bodyR+1;dy++) for (let dx=-bodyR-1;dx<=bodyR+1;dx++) {
    const d=Math.sqrt(dx*dx+dy*dy);
    if (d<=bodyR) { const o=d>bodyR-1.2; let c=o?pal.outline:pal.body;
      if (!o&&pattern>=1&&(dx+dy)%3===0) c=pal.accent;
      if (!o&&pattern>=2&&_sr(dx,dy,seed)>0.75) c=pal2.body;
      if (!o&&pattern>=3&&Math.abs(dx)<2) c=pal2.accent;
      _sp(grid,cx+dx,cy+dy,c);
    }
  }
  addEyes(grid,cx,cy,genes,pal);
  return grid;
}

function renderBlobid(genes, time, seed) {
  const grid = {}, pal = getPalette(genes.palette1), pal2 = getPalette(genes.palette2);
  const cx=20,cy=12, size=8+Math.floor(genes.size*10), fatness=0.3+genes.fatness*0.7;
  const bodyR=Math.round(size*0.45*fatness+3), hw=bodyR, hh=Math.round(bodyR*1.3);
  const pattern=Math.round(genes.pattern*4), tentacles=2+Math.round(genes.tentacles*6), wobble=genes.wobble*3;
  for (let dy=-hh-1;dy<=1;dy++) for (let dx=-hw-1;dx<=hw+1;dx++) {
    const nx=dx/hw,ny=dy/hh,d=Math.sqrt(nx*nx+ny*ny);
    if (d<=1.0) { const o=d>0.85; let c=o?pal.outline:pal.body;
      if (!o&&pattern>=1&&Math.abs(dy)%3===0) c=pal.accent;
      if (!o&&pattern>=2&&_sr(dx,dy,seed)>0.8) c=pal2.body;
      if (!o&&pattern>=3&&dy<-hh*0.5&&Math.abs(dx)<hw*0.3) c=pal2.accent;
      _sp(grid,cx+dx,cy+dy,c);
    }
  }
  for (let dx=-hw+1;dx<=hw-1;dx++) { _sp(grid,cx+dx,cy+1,pal.accent); _sp(grid,cx+dx,cy+2,pal.outline); }
  for (let i=0;i<tentacles;i++) {
    const tx=cx+Math.round(-hw+2+(i/(tentacles-1||1))*(hw*2-4));
    const tLen=Math.round(size*0.8+_sr(i,0,seed)*size*0.5);
    const sway=Math.sin(time*1.8+i*2.1)*wobble*1.2;
    for (let t=0;t<tLen;t++) {
      const ox=Math.round(tx+Math.sin(t*0.3+time+i)*sway), py=cy+3+t;
      _sp(grid,ox,py,t%3===0?pal.accent:(t===tLen-1?pal.outline:pal.body));
      if (t%2===0) _sp(grid,ox+1,py,pal.outline);
    }
  }
  addEyes(grid,cx,cy-Math.round(hh*0.3),genes,pal);
  return grid;
}

function renderCorallid(genes, time, seed) {
  const grid = {}, pal = getPalette(genes.palette1), pal2 = getPalette(genes.palette2);
  const cx=20,cy=20, size=8+Math.floor(genes.size*10);
  const branches=2+Math.round(genes.branches*3), density=0.3+genes.density*0.7;
  const pattern=Math.round(genes.pattern*4), wobble=genes.wobble*3;
  const baseW=Math.max(2,Math.round(size*0.2)), baseH=Math.round(size*0.3), baseY=size*0.5;
  for (let dy=0;dy<baseH;dy++) for (let dx=-baseW;dx<=baseW;dx++)
    _sp(grid,cx+dx,cy+baseY-dy,(Math.abs(dx)>=baseW||dy===0)?pal.outline:pal.body);
  function drawBranch(sx,sy,angle,len,depth) {
    const sway=Math.sin(time*1.2+depth*3+sx*0.5)*wobble*0.08;
    for (let t=0;t<len;t++) {
      const bx=Math.round(sx+Math.cos(angle+sway)*t), by=Math.round(sy+Math.sin(angle+sway)*t);
      const w=Math.max(1,Math.round((1-t/len)*(depth===0?3:2)*density));
      for (let s=-w;s<=w;s++) {
        const ppx=bx+Math.round(-Math.sin(angle)*s), ppy=by+Math.round(Math.cos(angle)*s);
        const edge=Math.abs(s)>=w||t===len-1; let c=edge?pal.outline:pal.body;
        if (!edge&&pattern>=1&&t%3===0) c=pal.accent;
        if (!edge&&pattern>=2&&_sr(bx,by,seed)>0.7) c=pal2.body;
        _sp(grid,ppx,ppy,c);
      }
      if (t===len-1&&depth>0) fillCircle(grid,bx,by,2,pattern>=3?pal2.accent:pal.accent,pal.outline);
    }
  }
  const topY=cy+baseY-baseH;
  for (let i=0;i<branches;i++) {
    const angle=-Math.PI/2+(i-(branches-1)/2)*(1.2/branches);
    const len=Math.round(size*(0.6+_sr(i,1,seed)*0.4));
    drawBranch(cx,topY,angle,len,0);
    for (let j=0;j<Math.round(density*3);j++) {
      const t=Math.round(len*(0.4+j*0.2));
      drawBranch(Math.round(cx+Math.cos(angle)*t),Math.round(topY+Math.sin(angle)*t),
        angle+(j%2===0?0.5:-0.5),Math.round(len*0.4),1);
    }
  }
  const ec=Math.round(genes.eyes*3);
  if (ec>=1){_sp(grid,cx-1,Math.round(cy+size*0.35),'#ffffff');_sp(grid,cx-1,Math.round(cy+size*0.35)-1,pal.outline);}
  if (ec>=2){_sp(grid,cx+1,Math.round(cy+size*0.35),'#ffffff');_sp(grid,cx+1,Math.round(cy+size*0.35)-1,pal.outline);}
  return grid;
}

function renderNucleid(genes, time, seed) {
  const grid = {}, pal = getPalette(genes.palette1), pal2 = getPalette(genes.palette2);
  const cx=20,cy=20, facets=3+Math.floor(genes.facets*6), rings=1+Math.floor(genes.rings*3);
  const size=8+Math.floor(genes.size*10), pattern=Math.round(genes.pattern*4);
  const spikes=Math.round(genes.spikes*3), wobble=genes.wobble*3;
  for (let r=rings;r>=0;r--) {
    const radius=Math.round((size*0.6)*((r+1)/(rings+1))), isOuter=r===rings;
    const c1=r%2===0?pal.body:pal.accent, c2=r%2===0?pal2.body:pal.body;
    const rot=time*0.3*(r%2===0?1:-1)*wobble*0.2;
    for (let dy=-radius-2;dy<=radius+2;dy++) for (let dx=-radius-2;dx<=radius+2;dx++) {
      const ad=Math.sqrt(dx*dx+dy*dy); if (ad>radius+1) continue;
      const a=Math.atan2(dy,dx)+rot, sect=(2*Math.PI)/facets;
      const rem=((a%sect)+sect)%sect, polyR=radius*Math.cos(Math.PI/facets)/Math.cos(rem-Math.PI/facets);
      if (ad<=Math.abs(polyR)+0.5) {
        const edge=ad>Math.abs(polyR)-1.2;
        let c=edge?pal.outline:(pattern>=2&&_sr(dx,dy,seed)>0.8?c2:c1);
        if (!edge&&pattern>=1&&(Math.abs(dx)+Math.abs(dy))%4===0) c=pal.accent;
        _sp(grid,cx+dx,cy+dy,c);
      }
    }
    for (let i=0;i<facets;i++) {
      const a=(i/facets)*Math.PI*2+rot;
      _sp(grid,cx+Math.round(Math.cos(a)*radius),cy+Math.round(Math.sin(a)*radius),pal.accent);
      if (spikes>=1&&isOuter) for (let s2=1;s2<=spikes+1;s2++)
        _sp(grid,cx+Math.round(Math.cos(a)*(radius+s2)),cy+Math.round(Math.sin(a)*(radius+s2)),
          s2===spikes+1?pal.outline:pal2.accent);
    }
    if (r<rings&&pattern>=3) {
      const outerR=Math.round((size*0.6)*((r+2)/(rings+1)));
      for (let i=0;i<facets;i++) { const a=(i/facets)*Math.PI*2+rot;
        for (let t=radius;t<outerR;t+=2) _sp(grid,cx+Math.round(Math.cos(a)*t),cy+Math.round(Math.sin(a)*t),pal.outline);
      }
    }
  }
  fillCircle(grid,cx,cy,2,pattern>=4?pal2.accent:pal.accent,pal.outline);
  addEyes(grid,cx,cy,genes,pal);
  return grid;
}

const TYPE_RENDERERS = { stellarid:renderStellarid, blobid:renderBlobid, corallid:renderCorallid, nucleid:renderNucleid };

// ============================================================
// GLSL SHADERS
// ============================================================
const VERT_SRC = `
attribute vec2 aPos;
varying vec2 vUv;
void main() {
  vUv = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}`;

const FRAG_COMMON = `
precision mediump float;
varying vec2 vUv;
uniform sampler2D uSampler;
uniform float uTime;
uniform vec2 uResolution;

// hash noise
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}
`;

const SHADERS = {
  none: FRAG_COMMON + `
void main() {
  gl_FragColor = texture2D(uSampler, vUv);
}`,

  metallic: FRAG_COMMON + `
void main() {
  vec4 c = texture2D(uSampler, vUv);
  if (c.a < 0.01) { gl_FragColor = c; return; }
  float lum = dot(c.rgb, vec3(0.299, 0.587, 0.114));
  // desaturate toward luminance
  vec3 desat = mix(vec3(lum), c.rgb, 0.3);
  // specular highlight bands traveling diagonally
  float highlight = sin((vUv.x + vUv.y) * 15.0 + uTime * 2.0) * 0.3 + 0.5;
  vec3 metal = desat + vec3(highlight * 0.35, highlight * 0.35, highlight * 0.4);
  gl_FragColor = vec4(metal, c.a);
}`,

  glitch: FRAG_COMMON + `
void main() {
  vec2 uv = vUv;
  // scanline displacement bands
  float band = step(0.7, sin(uv.y * 25.0 + uTime * 8.0));
  float offset = band * sin(uTime * 15.0 + uv.y * 10.0) * 0.08;
  uv.x += offset;
  // chromatic aberration
  float split = step(0.85, abs(sin(uTime * 6.0 + uv.y * 15.0))) * 0.015;
  float r = texture2D(uSampler, uv + vec2(-split, 0.0)).r;
  float g = texture2D(uSampler, uv).g;
  float b = texture2D(uSampler, uv + vec2(split, 0.0)).b;
  float a = texture2D(uSampler, uv).a;
  vec3 col = vec3(r, g, b);
  // random pixel noise
  float noise = hash(uv * 100.0 + uTime * 5.0);
  if (noise > 0.97 && a > 0.1) col = vec3(0.0, 1.0, 0.53);
  // scanline darkening
  col *= 0.9 + 0.1 * sin(uv.y * 80.0);
  gl_FragColor = vec4(col, a);
}`,

  fire: FRAG_COMMON + `
void main() {
  vec4 base = texture2D(uSampler, vUv);
  if (base.a < 0.01) {
    // fire particles above creature
    vec2 p = vUv;
    float fireY = 0.0;
    for (float i = 0.0; i < 5.0; i++) {
      vec2 fp = vec2(p.x + sin(uTime * 4.0 + i * 2.3) * 0.05, p.y);
      // check if there's creature below
      float checkDist = 0.02 + i * 0.01;
      vec4 below = texture2D(uSampler, vec2(fp.x, fp.y + checkDist));
      if (below.a > 0.1) {
        float flame = smoothstep(checkDist, 0.0, fp.y + checkDist - vUv.y);
        float flicker = sin(uTime * 8.0 + vUv.x * 30.0 + i) * 0.5 + 0.5;
        fireY += flame * flicker * 0.3;
      }
    }
    if (fireY > 0.05) {
      gl_FragColor = vec4(1.0, 0.3 + fireY * 0.7, fireY * 0.1, fireY);
    } else {
      gl_FragColor = base;
    }
    return;
  }
  // orange tint on creature
  vec3 tinted = base.rgb + vec3(0.15, -0.02, -0.1);
  // edge glow
  float edgeGlow = sin(uTime * 5.0 + vUv.x * 20.0) * 0.15 + 0.1;
  tinted += vec3(edgeGlow, edgeGlow * 0.3, 0.0);
  gl_FragColor = vec4(tinted, base.a);
}`,

  frost: FRAG_COMMON + `
void main() {
  vec4 base = texture2D(uSampler, vUv);
  if (base.a < 0.01) {
    // ice crystal sparkles near creature edges
    vec4 nearby = texture2D(uSampler, vUv + vec2(0.02, 0.0))
                + texture2D(uSampler, vUv - vec2(0.02, 0.0))
                + texture2D(uSampler, vUv + vec2(0.0, 0.02))
                + texture2D(uSampler, vUv - vec2(0.0, 0.02));
    if (nearby.a > 0.1) {
      float sparkle = hash(floor(vUv * 60.0) + floor(uTime * 2.0));
      if (sparkle > 0.7) {
        float bright = sin(uTime * 6.0 + vUv.x * 30.0 + vUv.y * 20.0) * 0.3 + 0.7;
        gl_FragColor = vec4(0.6 * bright, 0.85 * bright, 1.0 * bright, (sparkle - 0.7) * 3.0 * bright);
        return;
      }
    }
    gl_FragColor = base;
    return;
  }
  // cool blue tint
  vec3 frost = base.rgb + vec3(-0.15, 0.03, 0.22);
  gl_FragColor = vec4(frost, base.a);
}`,

  shiny: FRAG_COMMON + `
void main() {
  vec4 base = texture2D(uSampler, vUv);
  if (base.a < 0.01) { gl_FragColor = base; return; }
  // traveling highlight wave
  float wave = sin(vUv.x * 8.0 + vUv.y * 5.0 - uTime * 3.0) * 0.5 + 0.5;
  float boost = smoothstep(0.75, 1.0, wave) * 0.5;
  vec3 shiny = base.rgb + vec3(boost);
  // cross sparkles
  float sparkle = hash(floor(vUv * 40.0) + floor(uTime * 3.0));
  if (sparkle > 0.96) {
    float dist = length(fract(vUv * 40.0) - 0.5);
    // cross shape: bright on axes
    vec2 fv = fract(vUv * 40.0) - 0.5;
    float cross_shape = min(abs(fv.x), abs(fv.y));
    if (cross_shape < 0.15) {
      shiny = vec3(1.0, 0.95, 0.7);
    }
  }
  gl_FragColor = vec4(shiny, base.a);
}`,

  starry: FRAG_COMMON + `
void main() {
  vec4 base = texture2D(uSampler, vUv);
  if (base.a < 0.01) { gl_FragColor = base; return; }
  // darken + cosmic tint
  vec3 cosmic = base.rgb * vec3(0.5, 0.4, 0.5) + vec3(0.08, 0.04, 0.22);
  // internal twinkling stars
  float starField = hash(floor(vUv * 50.0) + floor(uTime * 0.5));
  if (starField > 0.92) {
    float twinkle = sin(uTime * 5.0 + vUv.x * 30.0 + vUv.y * 20.0) * 0.4 + 0.6;
    cosmic = mix(cosmic, vec3(0.85 + twinkle * 0.15, 0.85 + twinkle * 0.15, 1.0), 0.8);
  }
  gl_FragColor = vec4(cosmic, base.a);
}`,

  toxic: FRAG_COMMON + `
void main() {
  vec4 base = texture2D(uSampler, vUv);
  if (base.a < 0.01) {
    // dripping particles below creature
    vec4 above = texture2D(uSampler, vec2(vUv.x, vUv.y - 0.03));
    if (above.a > 0.1) {
      float drip = hash(floor(vec2(vUv.x * 30.0, uTime * 2.0)));
      if (drip > 0.6) {
        float dripLen = sin(uTime * 3.0 + vUv.x * 20.0) * 0.02 + 0.03;
        float d = smoothstep(dripLen, 0.0, vUv.y - (vUv.y - 0.03 + dripLen));
        if (d > 0.1) {
          float pulse = sin(uTime * 2.0 + vUv.x * 10.0) * 0.3 + 0.7;
          gl_FragColor = vec4(0.1, pulse * 0.8, 0.1, d * 0.7);
          return;
        }
      }
    }
    gl_FragColor = base;
    return;
  }
  // green toxic shift
  float pulse = sin(uTime * 2.0 + length(vUv - 0.5) * 8.0) * 0.3 + 0.7;
  vec3 toxic = vec3(base.r * 0.4, min(1.0, base.g * 0.6 + 0.45 * pulse), base.b * 0.3);
  gl_FragColor = vec4(toxic, base.a);
}`,

  phantom: FRAG_COMMON + `
void main() {
  float phase = sin(uTime * 1.5) * 0.3 + 0.5;
  // horizontal drift
  float drift = sin(uTime * 0.8 + vUv.y * 3.0) * 0.02;
  vec2 uv = vec2(vUv.x + drift, vUv.y);
  vec4 base = texture2D(uSampler, uv);
  if (base.a < 0.01) { gl_FragColor = vec4(0.0); return; }
  // ghostly desaturate + purple tint
  float lum = dot(base.rgb, vec3(0.299, 0.587, 0.114));
  vec3 ghost = mix(vec3(lum), base.rgb, 0.3) + vec3(0.15, 0.08, 0.25);
  // wave-based transparency
  float wave = sin(vUv.y * 10.0 + uTime * 2.0) * 0.15;
  float alpha = (phase + wave) * base.a;
  gl_FragColor = vec4(ghost, alpha);
}`
};

// ============================================================
// WEBGL SETUP
// ============================================================
function createShaderProgram(gl, fragSrc) {
  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, VERT_SRC); gl.compileShader(vs);
  if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS)) { console.error('VS:', gl.getShaderInfoLog(vs)); return null; }

  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, fragSrc); gl.compileShader(fs);
  if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) { console.error('FS:', gl.getShaderInfoLog(fs)); return null; }

  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { console.error('Link:', gl.getProgramInfoLog(prog)); return null; }

  return prog;
}

function setupWebGLCreature(glCanvas) {
  const gl = glCanvas.getContext('webgl', { premultipliedAlpha: false, alpha: true });
  if (!gl) return null;

  // fullscreen quad
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

  // texture
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);

  // compile all shader programs (cache them)
  const programs = {};
  for (const [id, src] of Object.entries(SHADERS)) {
    programs[id] = createShaderProgram(gl, src);
  }

  return { gl, buf, tex, programs };
}

function drawWebGL(entry, time) {
  const { gl, buf, tex, programs } = entry.webgl;
  const prog = programs[entry.creature.rare] || programs.none;
  if (!prog) return;

  // Upload creature 2D canvas as texture
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, entry.offscreen);

  gl.viewport(0, 0, CANVAS_PX, CANVAS_PX);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.useProgram(prog);

  // attributes
  const aPos = gl.getAttribLocation(prog, 'aPos');
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  // uniforms
  const uSampler = gl.getUniformLocation(prog, 'uSampler');
  const uTime = gl.getUniformLocation(prog, 'uTime');
  const uRes = gl.getUniformLocation(prog, 'uResolution');
  gl.uniform1i(uSampler, 0);
  gl.uniform1f(uTime, time);
  gl.uniform2f(uRes, CANVAS_PX, CANVAS_PX);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ============================================================
// ANIMATION LOOP
// ============================================================
const liveCreatures = [];

function startAnimation() {
  function tick(now) {
    const t = now / 1000;
    for (const entry of liveCreatures) {
      const time = t + entry.timeOffset;

      // 1. Render pixel grid to offscreen 2D canvas
      const grid = TYPE_RENDERERS[entry.creature.type](entry.creature.genes, time, entry.creature.seed);
      renderGridToCanvas(grid, entry.offCtx);

      // 2. Run WebGL shader pass
      drawWebGL(entry, time);

      // 3. Glow pulse on canvas element
      if (entry.creature.genes.glow > 0.5 || entry.creature.rare !== 'none') {
        const rareInfo = getRareInfo(entry.creature.rare);
        const glowStrength = entry.creature.genes.glow > 0.5 ? 0.15 : 0.08;
        const brightness = 1 + Math.sin(t * 3) * glowStrength;
        entry.glCanvas.style.filter = `brightness(${brightness})`;
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ============================================================
// UI
// ============================================================
const gridEl = document.getElementById('creature-grid');
const countEl = document.getElementById('count');
let totalCreatures = 0;

const TRAIT_COLORS = {
  arms:'#3aada8', size:'#7aaaff', fatness:'#d4627a', spikes:'#cd6a2a',
  pattern:'#b8b44a', glow:'#f0ee8a', tentacles:'#caaaff',
  branches:'#4aad4a', density:'#8aee8a', facets:'#7aaaff', rings:'#9a9abd'
};
function getDisplayTraits(creature) {
  const universal = ['arms','size','fatness','spikes','pattern','glow'];
  const specific = { stellarid:[], blobid:['tentacles'], corallid:['branches','density'], nucleid:['facets','rings'] };
  return [...universal, ...(specific[creature.type]||[])];
}

function addCreatureCard(creature) {
  const card = document.createElement('div');
  card.className = 'creature-card' + (creature.rare !== 'none' ? ' rare' : '');
  const rareInfo = getRareInfo(creature.rare);
  if (creature.rare !== 'none') card.style.setProperty('--rare-color', rareInfo.color + '40');

  // Offscreen 2D canvas (hidden, for pixel grid rendering)
  const offscreen = document.createElement('canvas');
  offscreen.width = CANVAS_PX; offscreen.height = CANVAS_PX;
  const offCtx = offscreen.getContext('2d');

  // Visible WebGL canvas (displays shader output)
  const glCanvas = document.createElement('canvas');
  glCanvas.width = CANVAS_PX; glCanvas.height = CANVAS_PX;
  glCanvas.style.width = '120px'; glCanvas.style.height = '120px';

  const webgl = setupWebGLCreature(glCanvas);

  liveCreatures.push({
    glCanvas, offscreen, offCtx, creature, webgl,
    timeOffset: Math.random() * 100
  });

  // Type badge
  const badge = document.createElement('span');
  badge.className = `creature-type type-${creature.type}`;
  badge.textContent = creature.type;

  // Rare badge
  let rareBadge = null;
  if (creature.rare !== 'none') {
    rareBadge = document.createElement('span');
    rareBadge.className = 'rare-badge';
    rareBadge.style.cssText = `background:${rareInfo.color}20; color:${rareInfo.color};`;
    rareBadge.textContent = `${rareInfo.icon} ${rareInfo.label.toUpperCase()}`;
  }

  // Name
  const nameEl = document.createElement('div');
  nameEl.className = 'creature-name';
  nameEl.textContent = creature.name;

  // Seed
  const seedEl = document.createElement('div');
  seedEl.style.cssText = 'font-size:7px; color:#1a3a3f;';
  seedEl.textContent = `#${creature.seed}`;

  // Trait bars
  const traitsEl = document.createElement('div');
  traitsEl.className = 'trait-bars';
  for (const trait of getDisplayTraits(creature)) {
    const val = creature.genes[trait];
    const row = document.createElement('div'); row.className = 'trait-row';
    const label = document.createElement('span'); label.className = 'trait-label';
    label.textContent = trait.slice(0,5).toUpperCase();
    const barBg = document.createElement('div'); barBg.className = 'trait-bar-bg';
    const barFill = document.createElement('div'); barFill.className = 'trait-bar-fill';
    barFill.style.width = `${val*100}%`;
    barFill.style.background = TRAIT_COLORS[trait] || '#3aada8';
    barBg.appendChild(barFill); row.appendChild(label); row.appendChild(barBg);
    traitsEl.appendChild(row);
  }

  card.appendChild(glCanvas);
  card.appendChild(badge);
  if (rareBadge) card.appendChild(rareBadge);
  card.appendChild(nameEl);
  card.appendChild(seedEl);
  card.appendChild(traitsEl);
  gridEl.appendChild(card);

  totalCreatures++;
  countEl.textContent = `${totalCreatures} creature${totalCreatures !== 1 ? 's' : ''}`;
}

function generateRandom() { addCreatureCard(createCreature()); }
function generateAllTypes() { for (const type of TYPES) addCreatureCard(createCreature(type)); }
function generateAllRares() {
  const rares = RARE_EFFECTS.filter(e => e.id !== 'none');
  for (const r of rares) {
    const type = TYPES[Math.floor(Math.random() * TYPES.length)];
    addCreatureCard(createCreature(type, undefined, r.id));
  }
}
function clearAll() {
  gridEl.innerHTML = ''; liveCreatures.length = 0;
  totalCreatures = 0; countEl.textContent = '0 creatures';
}

// ============================================================
// INIT
// ============================================================
startAnimation();
generateAllRares();
</script>
